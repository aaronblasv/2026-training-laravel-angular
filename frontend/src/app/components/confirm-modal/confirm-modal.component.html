@if (visible) {
  <div class="modal-overlay" (click)="cancel()">
    <div class="modal confirm-modal" (click)="$event.stopPropagation()">
      <h2>{{ title }}</h2>
      <p>{{ message }}</p>
      <div class="modal-actions">
        <button class="btn-secondary" (click)="cancel()">Cancelar</button>
        <button class="btn-danger" (click)="confirm()">Confirmar</button>
        </div>
    </div>
  </div>
}
