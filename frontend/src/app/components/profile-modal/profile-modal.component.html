@if (visible && user) {
  <div class="profile-overlay" (click)="onClose.emit()">
    <div class="profile-modal" (click)="$event.stopPropagation()">
      <button class="close-btn" (click)="onClose.emit()">✕</button>

      <div class="profile-header">
        <div class="profile-avatar-wrap">
          @if (user.image_src) {
            <img [src]="user.image_src" alt="" class="profile-avatar-img" />
          } @else {
            <div class="profile-avatar-placeholder">{{ user.name.charAt(0) | uppercase }}</div>
          }
        </div>
        <h2 class="profile-name">{{ user.name }}</h2>
        <span class="profile-role">{{ roleLabel }}</span>
      </div>

      <div class="profile-details">
        <div class="detail-row">
          <span class="detail-label">Email</span>
          <span class="detail-value">{{ user.email }}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Restaurante</span>
          <span class="detail-value">{{ restaurantName || '—' }}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Rol</span>
          <span class="detail-value">{{ roleLabel }}</span>
        </div>
      </div>

      <div class="profile-photo-section">
        @if (!editingPhoto) {
          <button class="btn-change-photo" (click)="startEditPhoto()">
            {{ user.image_src ? 'Cambiar foto' : 'Añadir foto' }}
          </button>
          @if (user.image_src) {
            <button class="btn-remove-photo" (click)="removePhoto()">Quitar foto</button>
          }
        } @else {
          <div class="photo-edit">
            <div class="photo-input-row">
              <input
                type="url"
                [(ngModel)]="photoUrl"
                placeholder="https://ejemplo.com/foto.jpg"
                class="photo-input"
              />
              <button type="button" class="btn-attach" (click)="fileInput.click()" title="Subir archivo">
                <ion-icon name="attach-outline"></ion-icon>
              </button>
              <input #fileInput type="file" accept="image/*" hidden (change)="onFileSelected($event)" />
            </div>
            @if (photoUrl) {
              <img [src]="photoUrl" alt="Preview" class="photo-preview" />
            }
            <div class="photo-actions">
              <button class="btn-save-photo" (click)="savePhoto()" [disabled]="saving">Guardar</button>
              <button class="btn-cancel-photo" (click)="cancelEditPhoto()">Cancelar</button>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
}
